<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //conditional statements in JS
        //if statement
        let age=17;
        if(age<18){
            console.log("You are eligible to vote");
        }
        //if else statement
        else{
            console.log("You are not eligible to vote");
        }
        //switch statement
        let grade = 'A';    
        switch(grade){
            case 'A':
                console.log("Excellent");
                break;
            case 'B':
                console.log("Good");
                break;
            case 'C':
                console.log("Average");
                break;
            default:
                console.log("Invalid grade");
        }
    </script>
</body>
</html>
